<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portfolio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.js"></script>
<style>
:root{
 --bg:#f3f4f6;--panel:#111827;--card:#fff;--muted:#9ca3af;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:Inter,Arial,sans-serif}
header{
position:sticky;top:0;z-index:100;
display:flex;align-items:center;justify-content:space-between;
padding:14px 22px;background:rgba(17,24,39,.96);
backdrop-filter:blur(10px);color:#fff;border-bottom:1px solid #2b3445;
}
.brand{font-weight:700;letter-spacing:.5px}
.controls{display:flex;gap:8px;flex-wrap:wrap}
button{
background:#1f2937;color:#fff;border:1px solid #374151;
padding:9px 12px;border-radius:10px;cursor:pointer;
}
button:hover{background:#374151}
#layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
#thumbs{
overflow:auto;padding:16px;background:#e8eaee;border-right:1px solid #ddd;
}
.thumb{
margin-bottom:12px;background:#fff;border-radius:8px;padding:6px;
box-shadow:0 3px 12px rgba(0,0,0,.08);cursor:pointer;
}
.thumb canvas{width:100%;height:auto;display:block}
#viewer{
padding:36px;
}
.page{
background:#fff;border-radius:16px;padding:16px;margin:0 auto 36px;
box-shadow:0 18px 40px rgba(0,0,0,.12);max-width:900px;
transition:transform .2s;
}
.page:hover{transform:translateY(-2px)}
.page canvas{width:100%;height:auto;display:block;border-radius:8px}
#info{color:#d1d5db}
@media(max-width:900px){
#layout{grid-template-columns:1fr}
#thumbs{display:none}
#viewer{padding:16px}
}
</style>
</head>
<body>
<header>
<div class="brand">Portfolio Viewer</div>
<div class="controls">
<button onclick="zoom(-0.15)">−</button>
<span id="info">Loading…</span>
<button onclick="zoom(0.15)">+</button>
<button onclick="toggleFull()">Fullscreen</button>

</div>
</header>

<div id="layout">
<div id="thumbs"></div>
<div id="viewer"></div>
</div>

<script>
const qs=new URLSearchParams(location.search);
const pdfFile=qs.get('file')||'portfolio.pdf';
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.worker.min.js';

let pdfDoc=null,scale=1.35;

async function render(){
const viewer=document.getElementById('viewer');
const thumbs=document.getElementById('thumbs');
viewer.innerHTML='';
thumbs.innerHTML='';
document.getElementById('info').textContent='Rendering...';

for(let i=1;i<=pdfDoc.numPages;i++){
 const page=await pdfDoc.getPage(i);

 // thumbnail
 const tv=page.getViewport({scale:0.25});
 const tc=document.createElement('canvas');
 tc.width=tv.width;tc.height=tv.height;
 await page.render({canvasContext:tc.getContext('2d'),viewport:tv}).promise;
 const th=document.createElement('div');
 th.className='thumb';
 th.appendChild(tc);
 th.onclick=()=>document.getElementById('p'+i).scrollIntoView({behavior:'smooth'});
 thumbs.appendChild(th);

 // full page
 const vp=page.getViewport({scale});
 const c=document.createElement('canvas');
 c.width=vp.width;c.height=vp.height;
 const wrap=document.createElement('div');
 wrap.className='page';
 wrap.id='p'+i;
 wrap.appendChild(c);
 viewer.appendChild(wrap);
 await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
}
document.getElementById('info').textContent=`${pdfDoc.numPages} pages • ${Math.round(scale*100)}%`;
}

function zoom(delta){scale=Math.max(.5,scale+delta);render();}
function toggleFull(){
 if(!document.fullscreenElement) document.documentElement.requestFullscreen();
 else document.exitFullscreen();
}

pdfjsLib.getDocument(decodeURIComponent(pdfFile)).promise.then(doc=>{pdfDoc=doc;render();})
.catch(e=>{document.getElementById('viewer').innerHTML='<h2>Unable to load PDF</h2><pre>'+e+'</pre>';});
</script>
</body>
</html>
