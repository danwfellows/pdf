<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portfolio Viewer</title>
<style>
body{margin:0;background:#e9ecef;font-family:system-ui,sans-serif}
header{position:sticky;top:0;display:flex;gap:12px;align-items:center;padding:12px 18px;background:#111;color:#fff;z-index:2}
button{background:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer}
button:hover{background:#ddd}
#viewer{max-width:900px;margin:30px auto;padding:0 20px}
.page{background:#fff;border-radius:10px;box-shadow:0 8px 25px rgba(0,0,0,.18);margin:0 auto 28px;padding:14px}
canvas{display:block;width:100%;height:auto;border-radius:6px}
#loading{text-align:center;padding:50px;color:#555}
</style>
<script type="module">
import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.worker.min.mjs';

let scale=1.3,pdfDoc;
const file=new URLSearchParams(location.search).get('file')||'Minizine%20Sep%202023.pdf';

async function render(){
 const wrap=document.getElementById('viewer');
 wrap.innerHTML='';
 for(let i=1;i<=pdfDoc.numPages;i++){
   const page=await pdfDoc.getPage(i);
   const viewport=page.getViewport({scale});
   const holder=document.createElement('div');
   holder.className='page';
   const c=document.createElement('canvas');
   c.width=viewport.width;
   c.height=viewport.height;
   holder.appendChild(c);
   wrap.appendChild(holder);
   await page.render({canvasContext:c.getContext('2d'),viewport}).promise;
 }
 document.getElementById('zoom').textContent=Math.round(scale*100)+'%';
}
window.zoomIn=()=>{scale+=0.15;render();}
window.zoomOut=()=>{if(scale>0.5){scale-=0.15;render();}}
window.printPdf=()=>window.open(file,'_blank');
window.downloadPdf=()=>window.open(file,'_blank');
pdfDoc=await pdfjsLib.getDocument(decodeURIComponent(file)).promise;
render();
</script>
</head>
<body>
<header>
<strong>Portfolio</strong>
<button onclick="zoomOut()">−</button>
<span id="zoom">130%</span>
<button onclick="zoomIn()">+</button>
<button onclick="printPdf()">Print</button>
<button onclick="downloadPdf()">Download</button>
</header>
<div id="viewer"><div id="loading">Loading PDF…</div></div>
</body>
</html>
