<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PDF Viewer</title>
<style>
body{margin:0;font-family:Arial;background:#f3f3f3}
#bar{position:sticky;top:0;background:#222;color:#fff;padding:10px;display:flex;gap:10px;align-items:center}
button{padding:6px 10px}
#viewer{display:flex;flex-direction:column;align-items:center;padding:16px}
canvas{background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.2);margin-bottom:20px;max-width:100%%;height:auto}
</style>
<script type="module">
import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.worker.min.mjs';
let scale=1.2,pdfDoc;
const file=new URLSearchParams(location.search).get('file')||'Minizine%20Sep%202023.pdf';
async function render(){
 const wrap=document.getElementById('viewer');wrap.innerHTML='';
 for(let i=1;i<=pdfDoc.numPages;i++){
  const p=await pdfDoc.getPage(i);
  const vp=p.getViewport({scale});
  const c=document.createElement('canvas');
  c.width=vp.width;c.height=vp.height;
  wrap.appendChild(c);
  await p.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
 }
 document.getElementById('zoom').textContent=Math.round(scale*100)+'%';
}
window.zoomIn=()=>{scale+=0.2;render()}
window.zoomOut=()=>{if(scale>0.4){scale-=0.2;render()}}
pdfDoc=await pdfjsLib.getDocument(decodeURIComponent(file)).promise;
render();
</script></head>
<body>
<div id="bar"><button onclick="zoomOut()">-</button><span id="zoom">120%</span><button onclick="zoomIn()">+</button></div>
<div id="viewer"></div>
</body></html>
