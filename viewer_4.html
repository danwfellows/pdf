<!DOCTYPE html>
<html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portfolio Viewer</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#20242b;color:#fff}
header{position:sticky;top:0;background:#111;padding:12px 18px;display:flex;justify-content:space-between;align-items:center}
#frame{width:100%;height:calc(100vh - 56px);border:0;background:#666}
</style>
</head>
<body>
<header>
<div><strong>Portfolio</strong></div>
</header>
<iframe id="frame" allowfullscreen></iframe>
<script>
const pdf=new URLSearchParams(location.search).get("file")||"portfolio.pdf";
document.getElementById("frame").src=pdf+"#view=FitH";
</script>
</body></html>
